<!doctype html>
<html>
    <head>
        <meta charset=utf-8>
        <meta name=viewport content="width=device-width,initial-scale=1,maximum-scale=2">
        <title>PubNub Channel Presence</title>
        <link rel=stylesheet href=default.css>
        <link href=https://fonts.googleapis.com/css?family=Source+Sans+Pro:200,400|Open+Sans:400,500,700 rel=stylesheet>
    </head>
    <body>
        <div id=responsive-wrapper>
        <div id=responsive-canvas>
        <div id=overlay></div>
        <div id=username-login>
            <div id=username-login-box>
                <h1>Join the Chat</h1>
                <input id=username-input type=text placeholder="Enter your username" maxlength=20 autofocus>
                <button id=username-join>Join</button>
                <p id=username-hint>Pick any username to start chatting</p>
            </div>
        </div>

        <div id=main>
            <!-- UPDATES -->
            <div class="section section-one"><div class=relative>
                <div class="circle-header circle-header-one"></div>
                <div class=circle-header-text>Updates</div>
                <div class="circle-header-icon circle-header-icon-one"></div>

                <div class=time id=time>00:00<sup>pm</sup></div>
                <div class=time-line></div>

                <div id=update-area class=update-area><div></div></div>
            </div></div>

            <!-- Updates Template -->
            <script id=update-template type=template>
                <div class=update-item>
                    <span class=update-time>{time}</span>
                    {name} {message}
                </div>
                <div class=update-line></div>
            </script>

            <!-- PEOPLE -->
            <div class="section section-two"><div class=relative>
                <div class="circle-header circle-header-two"></div>
                <div class=circle-header-text>
                    PEOPLE ( <span id=people-online>1</span> )
                </div>
                <div class="circle-header-icon circle-header-icon-two"></div>

                <!-- List of People -->
                <div id=list-of-people><div></div></div>
            </div></div>

            <!-- Person Template -->
            <script id=person-template type=template>
                <div class=person uuid={uuid}><div class=relative>
                    <div class=person-line></div>
                    <div
                        class="person-picture person-{status}"
                        style="background-image:url({bg})"
                    ></div>
                    <div class=person-name>{name} ({status})</div>
                </div></div>
            </script>

            <!-- CHAT  -->
            <div class="section section-three"><div class=relative>
                <div class="circle-header circle-header-three"></div>
                <div class=circle-header-text>Chat</div>
                <div class="circle-header-icon circle-header-icon-three"></div>

                <!-- Chat Box -->
                <div class=chat-box-area>
                <div class=chat-box-area-inset>
                <div class=relative>
                    <input
                        id=chat-input
                        class=chat-box-input
                        placeholder=chat
                    >
                    <button
                        id=chat-button
                        class=chat-box-button
                    >Send</button>
                    <div id=chat-box-user-icon></div>
                </div>
                </div>
                </div>

                <!-- Chat Content Area -->
                <div
                    id=talk-box-output
                    class=chat-box-output
                ><div></div></div>
            </div></div>

            <!-- Chat Message Template -->
            <script id=chat-message-template type=template>
                <div class=chat-box-person
                     name="{name}"
                     time="{time}"
                     join="{name}-{time}"
                     clock="{clock}"
                ><div class=relative>
                    <div class=chat-box-message-name>{name}</div>
                    <div class=chat-box-message-time>{time}</div>
                    <div class=chat-box-message msg-line=1>{message}</div>
                    <div class=clear></div>
                    <div class=chat-box-person-line></div>
                </div></div>
            </script>




            <!-- PubNub Logos -->
            <div id=footer-area><div class=relative>
                <div class=pubnub-logo-bottom>
                    <div class=pubnub-logo></div>
                </div>
            </div></div>
            <div class=pubnub-logo-top>
                <div class=pubnub-logo></div>
                powered by
            </div>
        </div> <!-- end #main -->
        </div> <!-- end #responsive-canvas -->
        </div> <!-- end #responsive-wrapper -->

        <!-- Hidden div to configure PubNub with SSL on initial load -->
        <div id=pubnub ssl=on style="display:none"></div>

        <script src=pubnub-3.2.js></script>
        <script src=animate.js></script>
        <script src=sound.js></script>
        <script src=chat.js></script>
        <script>
        // Responsive scaling: proportionally fit the 1024x768 canvas into the viewport
        (function(){
            var canvas = document.getElementById('responsive-canvas');
            if (!canvas) return;

            function scaleToFit() {
                var w = window.innerWidth;
                var h = window.innerHeight;
                var scale = Math.min(w / 1024, h / 768, 1.5);
                scale = Math.max(scale, 0.3);
                canvas.style.transform = 'scale(' + scale + ')';
            }

            scaleToFit();
            window.addEventListener('resize', scaleToFit);
            window.addEventListener('orientationchange', function() {
                setTimeout(scaleToFit, 200);
            });
        })();
        </script>
    </body>
</html>
